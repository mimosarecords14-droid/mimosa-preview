<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mimosa records | Sowing seeds of Music.</title>
    <meta name="description" content="音楽の種を蒔き、才能を咲かせるクリエイティブレーベル。">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;900&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        mimosa: '#FADB5F',
                        leaf: '#7BAA74',
                        dark: '#0f172a',
                    },
                    fontFamily: {
                        sans: ['"Noto Sans JP"', 'sans-serif'],
                        outfit: ['"Outfit"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        /* --- プロ仕様のカスタム・インラインCSS --- 
        */
        
        /* 1. 音楽の「質感」を出すためのグレイン（粒状）ノイズ */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* 2. ガラス質感の定義（Tailwind単体より深く設定） */
        .glass-ui {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* 3. ベントーグリッドのレイアウト制御 */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: minmax(160px, auto);
            gap: 1.5rem;
        }

        @media (max-width: 1024px) {
            .bento-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 640px) {
            .bento-grid { 
                grid-template-columns: 1fr;
                gap: 1rem;
            }
        }

        .bento-item {
            border-radius: 2rem;
            overflow: hidden;
            position: relative;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .bento-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 60px -12px rgba(15, 23, 42, 0.15);
        }

        /* 4. モバイルメニュー：波紋のようなアニメーション */
        #mobile-nav {
            clip-path: circle(0% at 90% 5%);
            transition: clip-path 0.7s cubic-bezier(0.19, 1, 0.22, 1);
            visibility: hidden;
        }

        #mobile-nav.is-active {
            clip-path: circle(150% at 90% 5%);
            visibility: visible;
        }

        /* 5. スクロール時のフェードイン */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-slate-50 text-dark selection:bg-mimosa selection:text-dark">

    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute -top-[10%] -left-[10%] w-[60%] h-[60%] rounded-full bg-mimosa/20 blur-[120px]"></div>
        <div class="absolute bottom-[5%] right-[0%] w-[40%] h-[40%] rounded-full bg-leaf/10 blur-[100px]"></div>
    </div>

<header class="fixed top-0 left-0 w-full z-[100] p-4 md:p-6">
    <nav class="max-w-7xl mx-auto flex justify-between items-center glass-ui rounded-full px-6 py-3 shadow-sm">
        
        <a href="index.html" class="flex items-center gap-3 group">
            <img src="./images/mimosa_records_logo.JPG" 
                 alt="mimosa records ロゴ" 
                 class="w-9 h-9 aspect-square rounded-full object-cover border border-leaf/20 shadow-sm transition-transform duration-300 group-hover:scale-105">
            <span class="font-outfit font-black text-xl tracking-tighter uppercase italic group-hover:text-leaf transition-colors">mimosa records</span>
        </a>

        <div class="hidden md:flex items-center gap-8 font-outfit font-bold text-[11px] tracking-[0.2em]">
            <a href="index.html" class="hover:text-leaf transition-colors relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-leaf hover:after:w-full after:transition-all">ARTISTS</a>
            <a href="members.html" class="hover:text-leaf transition-colors relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-leaf hover:after:w-full after:transition-all">MEMBERS</a>
            <a href="index.html#news" class="hover:text-leaf transition-colors relative after:content-[''] after:absolute after:-bottom-1 after:left-0 after:w-0 after:h-0.5 after:bg-leaf hover:after:w-full after:transition-all">NEWS</a>
            
            <a href="contact.html" class="bg-leaf text-white px-6 py-2 rounded-full shadow-md transition-all scale-105 pointer-events-none">CONTACT</a>
        </div>

        <button id="menu-btn" class="md:hidden w-10 h-10 flex flex-col justify-center items-center gap-1.5 z-[110]" aria-label="Menu">
            <span class="w-6 h-0.5 bg-dark transition-all duration-300 origin-center"></span>
            <span class="w-6 h-0.5 bg-dark transition-all duration-300 origin-center"></span>
        </button>
    </nav>
</header>

<section id="contact" class="relative z-10 flex justify-center px-6 py-20">
    <div class="glass-card bg-white/90 w-full max-w-2xl p-8 md:p-12 shadow-2xl rounded-3xl">
        
        <div class="text-center mb-10">
            <h2 class="text-3xl font-outfit font-bold text-dark tracking-tight">Contact</h2>
            <div class="h-1 w-12 bg-mimosa mx-auto mt-2 rounded-full"></div>
            <p class="text-sm text-slate-500 mt-4 font-sans">
                お問い合わせは以下のフォームより受け付けております。
            </p>
        </div>

        <form action="https://formspree.io/f/xbdpekjr" method="POST" class="space-y-6">
            <div class="form-item">
                <label for="email" class="block text-sm font-bold text-dark mb-2">
                    メールアドレス <span class="text-[10px] bg-red-400 text-white px-2 py-0.5 rounded ml-1 align-middle">必須</span>
                </label>
                <input type="email" id="email" name="email" required 
                    placeholder="example@mail.com"
                    class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-leaf focus:border-transparent outline-none transition-all">
            </div>

            <div class="form-item">
                <label for="message" class="block text-sm font-bold text-dark mb-2">
                    お問い合わせ内容 <span class="text-[10px] bg-red-400 text-white px-2 py-0.5 rounded ml-1 align-middle">必須</span>
                </label>
                <textarea id="message" name="message" required 
                    placeholder="ご質問やご依頼内容をご記入ください"
                    class="w-full px-4 py-3 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-leaf focus:border-transparent outline-none transition-all h-40 resize-none"></textarea>
            </div>

            <div class="text-center pt-4">
                <button type="submit" 
                    class="bg-dark text-white font-bold py-4 px-12 rounded-full hover:bg-leaf hover:scale-105 transition-all duration-300 shadow-lg active:scale-95">
                    送信する
                </button>
            </div>
        </form>
    </div>
</section>

    <!-- Footer -->
    <footer class="py-8 text-center text-dark/50 font-outfit text-xs backdrop-blur-md bg-white/10 border-t border-white/20 mt-12">
        <p class="address">大阪府高槻市宮野町1-26 ソングバードビル</p>

    </footer>
